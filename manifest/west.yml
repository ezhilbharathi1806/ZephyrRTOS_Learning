manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      repo-path: zephyr
      revision: main
      path: zephyr
      import:
        name-allowlist:
          - hal_rpi_pico     # Required for RP2040 support
          - cmsis            # Cortex-M core support
          - cmsis_6          
  self:
    path: manifest
