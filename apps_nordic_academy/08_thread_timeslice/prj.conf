# Enable printk for kernel logging and debugging output
CONFIG_PRINTK=y

# Enable timeslicing to allow multiple threads to share CPU time
CONFIG_TIMESLICING=y

# Set the timeslice duration in milliseconds (quantum of CPU time per thread)
CONFIG_TIMESLICE_SIZE=10

# Set the priority level threshold at which timeslicing is applied (0 = cooperative)
CONFIG_TIMESLICE_PRIORITY=0